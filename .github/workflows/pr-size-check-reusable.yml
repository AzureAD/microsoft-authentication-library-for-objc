# ============================================================
# PR Size Check — Reusable Workflow
#
# IMPORTANT: This file MUST be kept identical across repos.
# To update rules, edit in one repo and copy to the other.
#
# Hosted in:
#   - azure-activedirectory-tokenbroker-for-objc
#     (used by self + WorkplaceJoin-for-iOS)
#   - microsoft-authentication-library-for-objc
#     (used by self + microsoft-authentication-library-common-for-objc)
# ============================================================

name: PR Size Check (Reusable)

on:
  workflow_call:
    inputs:
      max_lines:
        description: "Maximum allowed line changes (default: 500)"
        required: false
        type: number
        default: 500
      exclude_paths:
        description: >
          Optional JSON array of regex strings for repo-specific path exclusions.
          These are added on top of the common exclusions.
        required: false
        type: string
        default: "[]"

# Restrict all permissions at workflow level; job level grants only what is needed
permissions: {}

concurrency:
  group: pr-size-check-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read

    steps:
      - name: Check PR size
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EXCLUDE_PATHS: ${{ inputs.exclude_paths }}
          MAX_LINES: ${{ inputs.max_lines }}
        with:
          script: |
            // ── Constants ─────────────────────────────────────────────────
            const TABLE_MAX_INCLUDED = 50;  // max included files shown in summary table
            const TABLE_MAX_EXCLUDED = 50;  // max excluded files shown in summary details
            const MAX_PAGES          = 3;   // 3 pages × 100 = 300 file cap
            const MAX_PATTERN_LEN    = 200; // 200 chars is generous for a path prefix regex
            
            // ── Safe error formatter ──────────────────────────────────────
            // Thrown values are not guaranteed to be Error instances in JS.
            const errMsg = e => e instanceof Error ? e.message : String(e);

            // ── Guard: must be called from a pull_request workflow ────────
            // Only trust context.payload.pull_request — do NOT fall back to
            // context.issue.number which could be an issue number, not a PR.
            const pull_number = context.payload.pull_request?.number;
            if (!pull_number) {
              core.setFailed(
                '❌ This reusable workflow must be called from a pull_request-triggered workflow ' +
                'so a pull request number is available.'
              );
              return;
            }

            // ── Validate max_lines ────────────────────────────────────────
            // Use Number + isInteger to reject floats like 500.9 which
            // parseInt would silently truncate to 500.
            const raw = Number(process.env.MAX_LINES);
            if (!Number.isInteger(raw) || raw <= 0) {
              core.setFailed(
                '❌ max_lines must be a positive integer.\n' +
                `Received: ${process.env.MAX_LINES}`
              );
              return;
            }
            const LIMIT = raw;

            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // ── Fetch all changed files (handles pagination) ─────────────
            let files = [];
            let page  = 1;
            try {
              while (page <= MAX_PAGES) {
                const response = await github.rest.pulls.listFiles({
                  owner, repo, pull_number,
                  per_page: 100,
                  page,
                });
                files = files.concat(response.data);
                if (response.data.length < 100) break;
                page++;
              }
            } catch (e) {
              core.setFailed(
                '❌ Failed to fetch changed files from GitHub API.\n' +
                `Error: ${errMsg(e)}`
              );
              return;
            }

            // ── Hard limit: fail if PR has more than 300 files ───────────
            // Only probe for a next page if we filled all MAX_PAGES pages —
            // avoids a false positive when the PR has exactly 300 files.
            if (files.length === MAX_PAGES * 100) {
              let hasMoreFiles = false;
              try {
                const probe = await github.rest.pulls.listFiles({
                  owner, repo, pull_number,
                  per_page: 1,
                  page: MAX_PAGES + 1,
                });
                hasMoreFiles = probe.data.length > 0;
              } catch (e) {
                core.setFailed(
                  '❌ Could not verify whether all changed files were fetched.\n' +
                  `Error: ${errMsg(e)}`
                );
                return;
              }
              if (hasMoreFiles) {
                try {
                  await core.summary
                    .addHeading(`PR Size Check — ${repo}`, 2)
                    .addRaw(
                      `> ❌ This PR has more than ${MAX_PAGES * 100} changed files.\n` +
                      `> Please split this PR into smaller pieces.\n`
                    )
                    .write();
                } catch (_) {}
                core.setFailed(
                  `❌ This PR has more than ${MAX_PAGES * 100} changed files. ` +
                  `Please split this PR into smaller pieces.`
                );
                return;
              }
            }

            // ── Common exclusions (applied to ALL repos) ─────────────────
            const COMMON_EXCLUDE = [
              // Xcode project & workspace config
              /\.pbxproj$/i,
              /\.xcscheme$/i,
              /\.xcsettings$/i,
              /\.xcconfig$/i,
              /\.xctestplan$/i,
              /\.xcworkspace\//i,
              /\.xcodeproj\//i,
              // Apple resource & config files
              /\.plist$/i,
              /\.entitlements$/i,
              /\.storyboard$/i,
              /\.xib$/i,
              /\.xcassets\//i,
              /\.modulemap$/i,
              /\.xcprivacy$/i,
              // Localization string files
              /\.strings$/i,
              /\.stringsdict$/i,
              /\.xcstrings$/i,
              // CI & pipeline
              /\.ya?ml$/i,
              // Lock & dependency files
              /\.lock$/i,
              // Images
              /\.(png|jpe?g|gif|bmp|svg|webp|heic|heif|tiff?|ico|pdf|icns)$/i,
              // Audio & video
              /\.(mp4|mov|m4v|avi|mpe?g|webm|mp3|wav|aiff?|m4a)$/i,
              // Docs
              /\.md$/i,
              /\.mdx$/i,
            ];

            // ── Per-repo exclusions passed from caller ────────────────────
            let extraPatterns = [];
            try {
              extraPatterns = JSON.parse(process.env.EXCLUDE_PATHS || '[]');
              if (!Array.isArray(extraPatterns)) {
                core.setFailed(
                  '❌ exclude_paths must be a JSON array of regex strings.\n' +
                  'Example: ["^MyTests/", "^Vendor/"]\n' +
                  `Received: ${process.env.EXCLUDE_PATHS}`
                );
                return;
              }
            } catch (e) {
              core.setFailed(
                '❌ Failed to parse exclude_paths — invalid JSON.\n' +
                'exclude_paths must be a JSON array of regex strings.\n' +
                'Example: ["^MyTests/", "^Vendor/"]\n' +
                `Received: ${process.env.EXCLUDE_PATHS}`
              );
              return;
            }

            // ── Compile per-repo regexes with per-pattern validation ──────
            const EXTRA_EXCLUDE = [];
            for (const p of extraPatterns) {
              if (typeof p !== 'string') {
                core.setFailed(
                  '❌ exclude_paths must be a JSON array of regex strings.\n' +
                  `Invalid entry (not a string): ${JSON.stringify(p)}`
                );
                return;
              }
              if (p.length > MAX_PATTERN_LEN) {
                core.setFailed(
                  `❌ exclude_paths pattern exceeds max length of ${MAX_PATTERN_LEN} chars.\n` +
                  `Pattern: ${p}`
                );
                return;
              }
              try {
                EXTRA_EXCLUDE.push(new RegExp(p, 'i'));
              } catch (e) {
                core.setFailed(
                  '❌ exclude_paths contains an invalid regex pattern.\n' +
                  `Pattern: ${p}\n` +
                  `Error: ${errMsg(e)}`
                );
                return;
              }
            }

            const ALL_EXCLUDE = [...COMMON_EXCLUDE, ...EXTRA_EXCLUDE];

            // ── Classify files (single pass) ──────────────────────────────
            const included = [];
            const excluded = [];
            const binaryNonExcluded = [];
            for (const f of files) {
              const isExcluded = ALL_EXCLUDE.some(rx => rx.test(f.filename));
              if (isExcluded) {
                excluded.push(f);
              } else if (f.patch === undefined && f.changes === 0 && f.status !== 'removed') {
                // Binary or submodule — GitHub API returns no patch and 0 changes
                binaryNonExcluded.push(f);
              } else {
                included.push(f);
              }
            }

            // ── Fail on non-excluded binary/submodule changes ─────────────
            if (binaryNonExcluded.length > 0) {
              const fileList = binaryNonExcluded.map(f => `- \`${f.filename}\``).join('\n');
              try {
                await core.summary
                  .addHeading(`PR Size Check — ${repo}`, 2)
                  .addRaw(
                    `> ❌ Binary or submodule changes detected in non-excluded files.\n` +
                    `> These cannot be counted and must be reviewed.\n\n` +
                    fileList + '\n'
                  )
                  .write();
              } catch (_) {}
              core.setFailed(
                `❌ PR contains ${binaryNonExcluded.length} binary/submodule change(s) in non-excluded files: ` +
                binaryNonExcluded.map(f => f.filename).join(', ')
              );
              return;
            }

            const totalLines = included.reduce((sum, f) => sum + f.additions + f.deletions, 0);
            const passed     = totalLines <= LIMIT;

            // ── Cap summary table to top N files by changes ───────────────
            const sortedIncluded = [...included].sort(
              (a, b) => (b.additions + b.deletions) - (a.additions + a.deletions)
            );
            const tableRows = sortedIncluded.slice(0, TABLE_MAX_INCLUDED).map(
              f => [f.filename, `+${f.additions} / -${f.deletions}`]
            );
            if (included.length > TABLE_MAX_INCLUDED) {
              tableRows.push([`(+${included.length - TABLE_MAX_INCLUDED} more files…)`, '']);
            }
            if (tableRows.length === 0) {
              tableRows.push(['No files counted after exclusions', '']);
            }

            // ── Cap excluded list (sorted by filename) ────────────────────
            const sortedExcluded = [...excluded].sort(
              (a, b) => a.filename.localeCompare(b.filename, 'en', { sensitivity: 'base' })
            );
            const excludedPreview = sortedExcluded.slice(0, TABLE_MAX_EXCLUDED).map(
              f => `- \`${f.filename}\``
            ).join('\n');
            const excludedList = excluded.length === 0
              ? 'None'
              : excluded.length > TABLE_MAX_EXCLUDED
                ? `${excludedPreview}\n- *(+${excluded.length - TABLE_MAX_EXCLUDED} more files not shown)*`
                : excludedPreview;

            // ── Write job summary ─────────────────────────────────────────
            try {
              await core.summary
                .addHeading(`PR Size Check — ${repo}`, 2)
                .addTable([
                  [{data: 'File', header: true}, {data: 'Changes (+ / -)', header: true}],
                  ...tableRows
                ])
                .addRaw(`\n**Total counted lines changed: ${totalLines} / ${LIMIT}**\n\n`)
                .addRaw(passed
                  ? `> ✅ PR size is within the limit.\n`
                  : `> ❌ Limit exceeded. Please split into smaller PRs.\n`
                )
                .addDetails('Excluded files (not counted)', excludedList)
                .write();
            } catch (e) {
              core.warning(`Failed to write job summary: ${errMsg(e)}`);
            }

            // ── Pass or fail ──────────────────────────────────────────────
            if (!passed) {
              core.setFailed(
                `❌ This PR changes ${totalLines} lines (excluding non-source and configured paths). ` +
                `The limit is ${LIMIT}. Please split into smaller PRs.`
              );
            } else {
              core.info(`✅ PR size OK: ${totalLines} / ${LIMIT} lines changed.`);
            }
