# ============================================================
# PR Size Check — Caller
#
# IMPORTANT: Do NOT edit the check logic here.
# All logic lives in the reusable workflow at:
#   .github/workflows/pr-size-check-reusable.yml
# ============================================================

name: PR Size Check

on:
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read

jobs:
  check-pr-size:
    name: PR Size Check
    uses: ./.github/workflows/pr-size-check-reusable.yml
    with:
      exclude_paths: |
        [
          "^MSAL/test/",
          "^MSAL/IdentityCore/",
          "^Samples/"
        ]
      # max_lines: 500      # ← uncomment to override the default limit (default: 500)