variables:
  - name: 'repositoryName' # Name of the repository
    value: 'AzureAD/microsoft-authentication-library-for-objc'
  - name: GEM_HOME
    value: $(Agent.TempDirectory)/.gem
  - name: arch
    value: arm64

schedules:
# daily build will only be triggered if there is any change between the build and last successful build
- cron: "0 4 * * *"
  displayName: Daily 8 pm build
  branches:
    include:
    - dev
- cron: "0 20 * * 0"
  displayName: Weekly Sunday build
  branches:
    include:
    - dev
  always: true

trigger:
  branches:
      include:
      - release/*
      - hotfix/*

pr: none

resources:
  repositories:
    # Shared ACES macOS job template (pool + Xcode + tool setup) — source of truth.
    # TODO: switch ref to 'main' once ameyapat/common-aces-config is merged.
    - repository: pipelinesShared
      type: git
      name: IDDP/MSAL-ObjC-Pipelines
      ref: refs/heads/ameyapat/common-aces-config

jobs:
- template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
  parameters:
    jobName: ui_automation
    displayName: 'Run MSAL UI automation'
    timeoutInMinutes: 360
    selectXcode: false
    installSlather: false
    installXcpretty: false
    installBundler: false
    installCocoaPods: false
    installXcbeautify: false
    steps:
      - template: templates/tests-with-conf-file.yml
        parameters:
          schema: 'MSAL Test Automation (iOS)'
          full_path: 'build/Build/Products/MSAL Test Automation (iOS)_iphonesimulator18.5-$(arch).xctestrun'
          destination: 'platform=iOS Simulator,name=iPhone 16,OS=18.6'
          sdk: 'iphonesimulator'
          retry_tests: 'true'

- template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
  parameters:
    jobName: e2e_test_native_auth_ios
    displayName: 'Run MSAL E2E tests for iOS native auth'
    timeoutInMinutes: 30
    selectXcode: false
    installSlather: false
    installXcpretty: false
    installBundler: false
    installCocoaPods: false
    installXcbeautify: false
    steps:
      - template: templates/tests-with-conf-file.yml
        parameters:
          schema: 'MSAL iOS Native Auth E2E Tests'
          full_path: 'build/Build/Products/MSAL iOS Native Auth E2E Tests_MSAL iOS Native Auth E2E Tests_iphonesimulator18.5-$(arch).xctestrun'
          destination: 'platform=iOS Simulator,name=iPhone 16,OS=18.6'
          sdk: 'iphonesimulator'
          retry_tests: 'false'

- template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
  parameters:
    jobName: e2e_test_native_auth_mac
    displayName: 'Run MSAL E2E tests for macOS native auth'
    timeoutInMinutes: 30
    selectXcode: false
    installSlather: false
    installXcpretty: false
    installBundler: false
    installCocoaPods: false
    installXcbeautify: false
    steps:
      - template: templates/tests-with-conf-file.yml
        parameters:
          schema: 'MSAL Mac Native Auth E2E Tests'
          full_path: 'build/Build/Products/MSAL Mac Native Auth E2E Tests_MSAL Mac Native Auth E2E Tests_macosx15.5-$(arch).xctestrun'
          destination: 'platform=macOS'
          sdk: 'macosx'
          retry_tests: 'false'

- template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
  parameters:
    jobName: cocoapods_lib_lint_static
    displayName: Run Cocoapods lib lint (static framework)
    timeoutInMinutes: 30
    selectXcode: false
    installSlather: false
    installXcpretty: false
    installBundler: false
    installCocoaPods: true
    installXcbeautify: false
    steps:
      - checkout: self
        clean: true
        submodules: true
        fetchDepth: 1
        persistCredentials: true
        path: s
      - task: Bash@3
        displayName: Replace HEADER_SEARCH_PATHS for NativeAuth subspec in MSAL.podspec
        inputs:
          targetType: 'inline'
          script: |
            sed -i '' 's/"$SRCROOT\/MSAL"/__dir__/' MSAL.podspec
          workingDirectory: '$(Build.SourcesDirectory)'
      - task: Bash@3
        displayName: Run pod lib lint
        inputs:
          targetType: 'inline'
          script: |
            export LANG=en_US.UTF-8
            export LC_ALL=en_US.UTF-8
            pod lib lint --fail-fast --allow-warnings --use-static-frameworks
          workingDirectory: '$(Build.SourcesDirectory)'
      - task: Bash@3
        displayName: Discard temporary changes made to MSAL.podspec
        inputs:
          targetType: 'inline'
          script: |
            git checkout -f -- MSAL.podspec
          workingDirectory: '$(Build.SourcesDirectory)'

- template: Pipeline YAMLs/shared/aces-macos-job.yml@pipelinesShared
  parameters:
    jobName: cocoapods_lib_lint_dynamic
    displayName: Run Cocoapods lib lint (dynamic framework)
    timeoutInMinutes: 30
    selectXcode: false
    installSlather: false
    installXcpretty: false
    installBundler: false
    installCocoaPods: true
    installXcbeautify: false
    steps:
      - checkout: self
        clean: true
        submodules: true
        fetchDepth: 1
        persistCredentials: true
        path: s
      - task: Bash@3
        displayName: Replace HEADER_SEARCH_PATHS for NativeAuth subspec in MSAL.podspec
        inputs:
          targetType: 'inline'
          script: |
            sed -i '' 's/"$SRCROOT\/MSAL"/__dir__/' MSAL.podspec
          workingDirectory: '$(Build.SourcesDirectory)'
      - task: Bash@3
        displayName: Run pod lib lint
        inputs:
          targetType: 'inline'
          script: |
            export LANG=en_US.UTF-8
            export LC_ALL=en_US.UTF-8
            pod lib lint --fail-fast --allow-warnings
          workingDirectory: '$(Build.SourcesDirectory)'
      - task: Bash@3
        displayName: Discard temporary changes made to MSAL.podspec
        inputs:
          targetType: 'inline'
          script: |
            git checkout -f -- MSAL.podspec
          workingDirectory: '$(Build.SourcesDirectory)'
