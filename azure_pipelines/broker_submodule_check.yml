# Xcode
# Build, test, and archive an Xcode workspace on macOS.
# Add steps that install certificates, test, sign, and distribute an app, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/xcode

parameters:
  - name: useACESPool
    displayName: 'Use ACES shared pool'
    type: boolean
    default: true

variables:
  - name: GEM_HOME
    value: $(Agent.TempDirectory)/.gem

trigger:
  branches:
    include:
    - dev

pr:
  autoCancel: true
  branches:
    include:
    - '*'
  drafts: true

pool:
  name: 'Azure Pipelines'

resources:
 repositories:
   - repository: azure-activedirectory-tokenbroker-for-objc
     type: github
     endpoint: 'MSAL ObjC Service Connection'
     name: AzureAD/azure-activedirectory-tokenbroker-for-objc

   - repository: WorkplaceJoin-for-iOS
     type: github
     endpoint: 'MSAL ObjC Service Connection'
     name: AzureAD/WorkplaceJoin-for-iOS

jobs:
- job: 'Validate_Pull_Request'
  strategy:
    maxParallel: 2
    matrix:
      IOS_LIB:
        target: "ios_library"
      MAC_LIB:
        target: "mac_library"
  # Note: visionOS validation moved to visionos-validation.yml (runs on PRs to main/release only)
  displayName: Validate Pull Request
  timeoutInMinutes: 75
  pool:
    ${{ if eq(parameters.useACESPool, true) }}:
      name: AcesShared
      demands:
        - ImageOverride -equals aces_vm_sharedpool_sequoia
    ${{ else }}:
      vmImage: 'macOS-15'

  steps:
  - checkout: azure-activedirectory-tokenbroker-for-objc
    displayName: 'Checkout Broker'
    clean: false
    submodules: false
    fetchTags: true
    persistCredentials: true

  - checkout: self
    displayName: 'Checkout MSAL'
    clean: false
    submodules: false
    fetchTags: true
    path: 's/azure-activedirectory-tokenbroker-for-objc/ADAuthenticationBroker/Frameworks/microsoft-authentication-library-for-objc'
    persistCredentials: true

  - task: Bash@3
    displayName: 'Checkout MSAL submodules + ADAL'
    inputs:
      workingDirectory: $(Pipeline.Workspace)/s
      targetType: 'inline'
      script: |
        cd azure-activedirectory-tokenbroker-for-objc
        git submodule update --init --recursive ADAuthenticationBroker/Frameworks/adal
        cd ADAuthenticationBroker/Frameworks/microsoft-authentication-library-for-objc
        git submodule update --init --recursive

  - checkout: WorkplaceJoin-for-iOS
    displayName: 'Checkout WPJ'
    clean: false
    submodules: false
    fetchTags: true
    path: 's/azure-activedirectory-tokenbroker-for-objc/ADAuthenticationBroker/Frameworks/WorkplaceJoin-for-iOS'
    persistCredentials: true

  - task: AzureCLI@2
    inputs:
      azureSubscription: 'AuthSdkResourceManager'
      scriptType: 'pscore'
      scriptLocation: 'inlineScript'
      inlineScript: |
        # if this fails, check out this bash script that includes diagnostics:
        # https://gist.github.com/johnterickson/19f80a3e969e39f1000d118739176e62
        # uncomment these for more debugging spew
        # GIT_TRACE=1
        # GIT_CURL_VERBOSE=1
        
        # Note that the resoruce is specified to limit the token to Azure DevOps
        $token = az account get-access-token --query accessToken --resource 499b84ac-1321-427f-aa17-267ca6975798 -o tsv
        Write-Host "##vso[task.setvariable variable=aadToken;issecret=true]$token"
  - task: Bash@3
    displayName: 'Checkout NGC Submodules'
    env:
      AccessToken: $(MSAzureToken_encoded)
    inputs:
      workingDirectory: $(Pipeline.Workspace)/s
      targetType: 'inline'
      script: |
        cd azure-activedirectory-tokenbroker-for-objc/ADAuthenticationBroker/Frameworks
        git -c http.https://msazure.visualstudio.com/DefaultCollection/One/_git/AD-MFA-NGCAuthentication.extraheader="AUTHORIZATION: bearer $(aadToken)" submodule update --init AD-MFA-NGCAuthentication
        cd AD-MFA-NGCAuthentication
        git -c http.https://msazure.visualstudio.com/DefaultCollection/One/_git/AD-MFA-NGCKeyProvider-ios.extraheader="AUTHORIZATION: bearer $(aadToken)" submodule update --init NGCKeyProvider
        git -c http.https://msazure.visualstudio.com/DefaultCollection/One/_git/AD-MFA-MSAuthNetworking.extraheader="AUTHORIZATION: bearer $(aadToken)" submodule update --init MSAuthNetworking

  - task: Bash@3
    displayName: 'Checkout WPJ openssl-msft submodule'
    inputs:
      workingDirectory: $(Pipeline.Workspace)/s
      targetType: 'inline'
      script: |
        cd azure-activedirectory-tokenbroker-for-objc/ADAuthenticationBroker/Frameworks/WorkplaceJoin-for-iOS
        git -c http.https://msazure.visualstudio.com/DefaultCollection/PlatformCrypto/_git/openssl-msft.extraheader="AUTHORIZATION: bearer $(aadToken)" submodule update --init Frameworks/openssl-msft

  - task: Bash@3
    displayName: 'Update WPJ submodules'
    inputs:
      workingDirectory: $(Pipeline.Workspace)/s
      targetType: 'inline'
      script: |
        cd azure-activedirectory-tokenbroker-for-objc/ADAuthenticationBroker/Frameworks/WorkplaceJoin-for-iOS
        git submodule update --init --recursive Frameworks/microsoft-authentication-library-for-objc

  - task: Cache@2
    displayName: 'Cache CocoaPods'
    condition: eq(variables['target'], 'mac_library')
    inputs:
      key: 'cocoapods | "$(Agent.OS)" | azure-activedirectory-tokenbroker-for-objc/ADAuthenticationBroker/Podfile.lock'
      path: '$(Pipeline.Workspace)/s/azure-activedirectory-tokenbroker-for-objc/ADAuthenticationBroker/Pods'

  - ${{ if eq(parameters.useACESPool, true) }}:
    - task: Bash@3
      displayName: 'Install CocoaPods CLI'
      condition: eq(variables['target'], 'mac_library')
      inputs:
        targetType: 'inline'
        script: |
          # System Ruby (2.6) on macOS agents is too old for latest ffi/cocoapods.
          # Install via Homebrew which ships its own modern Ruby.
          export HOMEBREW_NO_AUTO_UPDATE=1
          export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
          if brew list cocoapods >/dev/null 2>&1; then
            echo "CocoaPods already installed; skipping brew install."
          else
            brew install cocoapods
          fi
          pod --version

  - task: Bash@3
    displayName: 'Install CocoaPods dependencies'
    condition: eq(variables['target'], 'mac_library')
    env:
      AAD_TOKEN: $(aadToken)
    inputs:
      workingDirectory: $(Pipeline.Workspace)/s/azure-activedirectory-tokenbroker-for-objc/ADAuthenticationBroker
      targetType: 'inline'
      script: |
        export LANG=en_US.UTF-8
        export LC_ALL=en_US.UTF-8
        GIT_CONFIG_COUNT=1 \
        GIT_CONFIG_KEY_0=http.https://office.visualstudio.com/.extraheader \
        GIT_CONFIG_VALUE_0="AUTHORIZATION: bearer $AAD_TOKEN" \
        pod install
    retryCountOnTaskFailure: 1

  - script: |
      # System Ruby on macOS agents is 2.6, too old for current slather/bundler.
      # Install a modern Ruby via Homebrew and prepend it to PATH for all subsequent steps.
      export HOMEBREW_NO_AUTO_UPDATE=1
      export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
      brew list ruby >/dev/null 2>&1 || brew install ruby
      RUBY_BIN="$(brew --prefix ruby)/bin"
      echo "##vso[task.prependpath]$GEM_HOME/bin"
      echo "##vso[task.prependpath]$RUBY_BIN"
      "$RUBY_BIN/ruby" --version
    displayName: 'Install modern Ruby'

  - script: 'gem uninstall xcpretty -I --version 0.4.0 || true'
    displayName: 'Uninstall xcpretty v0.4.0'

  - script: 'gem install xcpretty -N -v 0.3.0'
    displayName: 'Install xcpretty v0.3.0'
    
  - script: 'gem install slather -N'
    displayName: 'Install slather'

  - script: |
      export HOMEBREW_NO_AUTO_UPDATE=1
      export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
      brew list xcbeautify >/dev/null 2>&1 || brew install xcbeautify
      xcbeautify --version
    displayName: 'Install xcbeautify'

  - task: UsePythonVersion@0
    displayName: 'Use Python 3.x'

  - task: Bash@3
    displayName: 'Run a python script for Broker'
    inputs:
      targetType: 'inline'
      script: |
        cd azure-activedirectory-tokenbroker-for-objc
        echo "executing build:./build.py"
        { output=$(./build.py --show-build-settings --target $(target) 2>&1 1>&3-) ;} 3>&1
        final_status=$(<./build/status.txt)
        echo "FINAL STATUS  = ${final_status}"
        echo "POSSIBLE ERRORS: ${output}"
        
        if [ $final_status != "0" ]; then
          echo "Build & Testing Failed! \n ${output}" >&2
        fi
      failOnStderr: true

  - task: Bash@3
    condition: always()
    displayName: 'Summarize failed tests'
    inputs:
      workingDirectory: $(Pipeline.Workspace)/s
      targetType: 'inline'
      script: |
        set +e
        REPORTS_DIR="azure-activedirectory-tokenbroker-for-objc/build/reports"
        echo "Scanning for JUnit XML reports in: $REPORTS_DIR"

        if [ ! -d "$REPORTS_DIR" ]; then
          echo "Reports directory does not exist; nothing to summarize."
          exit 0
        fi

        python3 - "$REPORTS_DIR" "$(target)" <<'PY'
        import os, sys, glob, xml.etree.ElementTree as ET

        reports_dir, target_name = sys.argv[1], sys.argv[2]
        xml_files = sorted(glob.glob(os.path.join(reports_dir, "*.xml")))

        if not xml_files:
            print("No JUnit XML reports found; nothing to summarize.")
            sys.exit(0)

        failures = []  # (report_name, classname, test_name, message)
        total_tests = 0
        total_failures = 0
        total_errors = 0

        for path in xml_files:
            report_name = os.path.splitext(os.path.basename(path))[0]
            try:
                root = ET.parse(path).getroot()
            except ET.ParseError as exc:
                print(f"Could not parse {path}: {exc}")
                continue

            suites = root.iter("testsuite")
            for suite in suites:
                for case in suite.iter("testcase"):
                    total_tests += 1
                    classname = case.get("classname", "")
                    name = case.get("name", "")
                    failure = case.find("failure")
                    error = case.find("error")
                    bad = failure if failure is not None else error
                    if bad is None:
                        continue
                    if failure is not None:
                        total_failures += 1
                    else:
                        total_errors += 1
                    msg = (bad.get("message") or bad.text or "").strip().splitlines()
                    msg = msg[0] if msg else ""
                    if len(msg) > 100:
                        msg = msg[:97] + "..."
                    failures.append((report_name, classname, name, msg))

        print("")
        print("============================================================")
        print(f" Failed Tests Summary (target: {target_name})")
        print("============================================================")
        print(f"Reports scanned: {len(xml_files)}")
        print(f"Total tests:     {total_tests}")
        print(f"Failures:        {total_failures}")
        print(f"Errors:          {total_errors}")
        print("")

        if not failures:
            print("No failed tests detected.")
            sys.exit(0)

        col_report = max(len("Report"), max(len(r) for r, _, _, _ in failures))
        col_class  = max(len("Class"),  max(len(c) for _, c, _, _ in failures))
        col_test   = max(len("Test"),   max(len(n) for _, _, n, _ in failures))
        col_msg    = max(len("Message"),max(len(m) for _, _, _, m in failures))

        def sep():
            return "+" + "-" * (col_report + 2) + "+" + "-" * (col_class + 2) + \
                   "+" + "-" * (col_test + 2) + "+" + "-" * (col_msg + 2) + "+"

        def row(a, b, c, d):
            return (f"| {a:<{col_report}} | {b:<{col_class}} | "
                    f"{c:<{col_test}} | {d:<{col_msg}} |")

        print(sep())
        print(row("Report", "Class", "Test", "Message"))
        print(sep())
        for r, c, n, m in failures:
            print(row(r, c, n, m))
        print(sep())
        PY

  - task: Bash@3
    condition: always()
    displayName: Cleanup
    inputs:
      targetType: 'inline'
      script: |
        rm -rf ./build/status.txt
        
