steps:
  - checkout: self
    clean: true
    submodules: true
    fetchDepth: 1
    persistCredentials: true
    path: s
    
  - task: Bash@3
    displayName: 'Select Xcode version'
    inputs:
      targetType: 'inline'
      script: '/bin/bash -c "sudo xcode-select -s /Applications/Xcode_16.1.app"'
  
  - task: Bash@3
    displayName: Go to project folder
    inputs:
      targetType: 'inline'
      script: |        
        cd $(Agent.BuildDirectory)/s

  - task: Bash@3
    displayName: Warm up simulator
    condition: and(succeeded(), eq('${{ parameters.sdk }}', 'iphonesimulator'))
    inputs:
      targetType: 'inline'
      script: |
        set -euo pipefail
        SIM_NAME=$(echo '${{ parameters.destination }}' | sed -n 's/.*name=\([^,]*\).*/\1/p')
        SIM_OS=$(echo '${{ parameters.destination }}' | sed -n 's/.*OS=\([^,]*\).*/\1/p')
        RUNTIME="com.apple.CoreSimulator.SimRuntime.iOS-${SIM_OS//./-}"

        echo "Looking for simulator: $SIM_NAME (runtime: $RUNTIME)"

        xcrun simctl shutdown all 2>/dev/null || true

        # Find the UDID of the existing simulator matching name + runtime
        UDID=$(xcrun simctl list devices available -j | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for rt, devs in data.get('devices', {}).items():
            if sys.argv[2] in rt:
                for d in devs:
                    if d['name'] == sys.argv[1] and d['isAvailable']:
                        print(d['udid']); sys.exit(0)
        sys.exit(1)
        " "$SIM_NAME" "$RUNTIME") || UDID=""

        if [ -z "$UDID" ]; then
            echo "No existing simulator found, creating one..."
            UDID=$(xcrun simctl create "$SIM_NAME" "com.apple.CoreSimulator.SimDeviceType.${SIM_NAME// /-}" "$RUNTIME")
        fi

        echo "Using simulator UDID: $UDID"
        # Reset simulator to clean state (erase all content and settings)
        xcrun simctl erase "$UDID" || true
        xcrun simctl boot "$UDID" || true
        xcrun simctl bootstatus "$UDID" -b -d 600

        xcrun simctl list devices booted
  
  - script: 'gem uninstall xcpretty -I --version 0.4.0'
    displayName: 'Uninstall xcpretty v0.4.0'
  
  - script: 'gem install xcpretty -v 0.3.0'
    displayName: 'Install xcpretty v0.3.0'

  - task: AzureCLI@2
    displayName: 'Read configuration from KeyVault'
    inputs:
      azureSubscription: 'AuthSdkResourceManager'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: 'python get_automation_conf_file.py'
      workingDirectory: azure_pipelines/scripts/
  - task: Bash@3
    displayName: Build for testing
    inputs:
      targetType: 'inline'
      script: |
        mv azure_pipelines/scripts/conf.json MSAL/test/automation/conf.json
        ruby TestRubyFile.rb
        xcodebuild build-for-testing \
          -workspace MSAL.xcworkspace \
          -scheme '${{ parameters.schema }}' \
          -sdk ${{ parameters.sdk }} \
          -destination '${{ parameters.destination }}' \
          -derivedDataPath 'build' \
          | tee xcodebuild.log \
          | xcpretty -c

  - ${{ if eq(parameters.retry_tests, 'true') }}:    
    - task: Bash@3
      displayName: Run automations
      inputs:
        targetType: 'inline'
        script: |
          ls build/Build/Products/
          xcodebuild test-without-building \
              -xctestrun '${{ parameters.full_path }}' \
              -destination '${{ parameters.destination }}' \
              -retry-tests-on-failure \
              -test-iterations 3 \
              -parallel-testing-enabled NO \
              -quiet \
              -resultBundlePath '$(Agent.BuildDirectory)/s/test_output/report.xcresult'
  - ${{ if eq(parameters.retry_tests, 'false') }}:    
    - task: Bash@3
      displayName: Run automations
      inputs:
        targetType: 'inline'
        script: |
          ls build/Build/Products/
          xcodebuild test-without-building \
              -xctestrun '${{ parameters.full_path }}' \
              -destination '${{ parameters.destination }}' \
              -parallel-testing-enabled NO \
              -resultBundlePath '$(Agent.BuildDirectory)/s/test_output/report.xcresult'

  # https://learn.microsoft.com/en-us/azure/devops/pipelines/artifacts/pipeline-artifacts?view=azure-devops&tabs=yaml#q-can-i-delete-pipeline-artifacts-when-re-running-failed-jobs
  - task: PublishPipelineArtifact@1
    condition: succeededOrFailed()
    inputs:
      targetPath: '$(Agent.BuildDirectory)/s/test_output/'
      artifactName: 'TestOutputs Attempt - $(System.StageAttempt) - ${{ parameters.schema }}'
      publishLocation: 'pipeline'
  - task: PublishPipelineArtifact@1
    condition: failed()
    displayName: "Publish crash report if any"
    inputs:
      targetPath: "/Users/runner/Library/Logs/DiagnosticReports"
      artifactName: "crash folder"
      publishLocation: "pipeline"
  
