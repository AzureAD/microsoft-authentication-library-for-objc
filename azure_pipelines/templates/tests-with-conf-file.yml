parameters:
  - name: schema
    type: string
  - name: destination
    type: string
  - name: sdk
    type: string
  - name: retry_tests
    type: string
    default: 'false'

steps:
  - checkout: self
    clean: true
    submodules: true
    fetchDepth: 1
    persistCredentials: true
    path: s
    
  - task: Bash@3
    displayName: Go to project folder
    inputs:
      targetType: 'inline'
      script: |        
        cd $(Agent.BuildDirectory)/s
  
  - script: gem uninstall xcpretty -I --version 0.4.0 || true
    displayName: 'Uninstall xcpretty v0.4.0'
  
  - script: |
      export PATH="$GEM_HOME/bin:$PATH"
      gem install xcpretty -v 0.3.0
      gem install xcodeproj -N -v 1.27.0
    displayName: 'Install xcpretty v0.3.0 and xcodeproj'

  - task: AzureCLI@2
    displayName: 'Read configuration from KeyVault'
    inputs:
      azureSubscription: 'AuthSdkResourceManager'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: 'python3 get_automation_conf_file.py'
      workingDirectory: azure_pipelines/scripts/

  - task: AzureKeyVault@2
    displayName: 'Fetch LabAuth from Key Vault'
    inputs:
      azureSubscription: 'AuthSdkResourceManager'
      KeyVaultName: 'msidlabs'
      SecretsFilter: 'LabAuth'

  - task: Bash@3
    displayName: Build for testing
    inputs:
      targetType: 'inline'
      script: |
        set -o pipefail
        export PATH="$GEM_HOME/bin:$PATH"
        export LANG=en_US.UTF-8
        export LC_ALL=en_US.UTF-8
        mv azure_pipelines/scripts/conf.json MSAL/test/automation/conf.json
        mkdir -p ~/aadtests
        cp MSAL/test/automation/conf.json ~/aadtests/conf.json
        ruby TestRubyFile.rb
        xcodebuild build-for-testing \
          -workspace MSAL.xcworkspace \
          -scheme '${{ parameters.schema }}' \
          -sdk ${{ parameters.sdk }} \
          -destination '${{ parameters.destination }}' \
          -derivedDataPath 'build' \
          2>&1 | tee xcodebuild.log | xcpretty -c
        BUILD_EXIT=${PIPESTATUS[0]}
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "##[error]xcodebuild build-for-testing failed with exit code $BUILD_EXIT"
          echo "##[group]Raw xcodebuild log (last 200 lines)"
          tail -200 xcodebuild.log
          echo "##[endgroup]"
          exit $BUILD_EXIT
        fi
    env:
      KEYVAULT_CERTIFICATE_DATA: $(LabAuth)

  - ${{ if eq(parameters.retry_tests, 'true') }}:    
    - task: Bash@3
      displayName: Run automations
      inputs:
        targetType: 'inline'
        script: |
          ls build/Build/Products/
          XCTESTRUN=$(ls "build/Build/Products/${{ parameters.schema }}"*.xctestrun 2>/dev/null | head -n1)
          if [ -z "$XCTESTRUN" ]; then
            echo "No .xctestrun file found for scheme '${{ parameters.schema }}'"
            ls -la build/Build/Products/ || true
            exit 1
          fi
          echo "Using xctestrun: $XCTESTRUN"
          xcodebuild test-without-building \
              -xctestrun "$XCTESTRUN" \
              -destination '${{ parameters.destination }}' \
              -derivedDataPath 'build' \
              -retry-tests-on-failure \
              -test-iterations 3 \
              -parallel-testing-enabled NO \
              -quiet \
              -resultBundlePath '$(Agent.BuildDirectory)/s/test_output/report.xcresult'
      env:
        KEYVAULT_CERTIFICATE_DATA: $(LabAuth)
  - ${{ if eq(parameters.retry_tests, 'false') }}:    
    - task: Bash@3
      displayName: Run automations
      inputs:
        targetType: 'inline'
        script: |
          ls build/Build/Products/
          XCTESTRUN=$(ls "build/Build/Products/${{ parameters.schema }}"*.xctestrun 2>/dev/null | head -n1)
          if [ -z "$XCTESTRUN" ]; then
            echo "No .xctestrun file found for scheme '${{ parameters.schema }}'"
            ls -la build/Build/Products/ || true
            exit 1
          fi
          echo "Using xctestrun: $XCTESTRUN"
          xcodebuild test-without-building \
              -xctestrun "$XCTESTRUN" \
              -destination '${{ parameters.destination }}' \
              -derivedDataPath 'build' \
              -parallel-testing-enabled NO \
              -resultBundlePath '$(Agent.BuildDirectory)/s/test_output/report.xcresult'
      env:
        KEYVAULT_CERTIFICATE_DATA: $(LabAuth)

  # https://learn.microsoft.com/en-us/azure/devops/pipelines/artifacts/pipeline-artifacts?view=azure-devops&tabs=yaml#q-can-i-delete-pipeline-artifacts-when-re-running-failed-jobs
  - task: PublishPipelineArtifact@1
    condition: succeededOrFailed()
    inputs:
      targetPath: '$(Agent.BuildDirectory)/s/test_output/'
      artifactName: 'TestOutputs Attempt - $(System.StageAttempt) - ${{ parameters.schema }}'
      publishLocation: 'pipeline'
  - task: Bash@3
    condition: succeededOrFailed()
    continueOnError: true
    displayName: 'Print test results summary'
    inputs:
      targetType: 'inline'
      script: |
        echo "##[group]Test Results Summary"
        XCRESULT="$(Agent.BuildDirectory)/s/test_output/report.xcresult"
        if [ -d "$XCRESULT" ]; then
          xcrun xcresulttool get test-results summary --path "$XCRESULT" 2>/dev/null || echo "Could not extract summary"
        else
          echo "No xcresult found"
        fi
        echo "##[endgroup]"
  - task: Bash@3
    condition: succeededOrFailed()
    displayName: 'Convert xcresult to JUnit XML'
    inputs:
      targetType: 'inline'
      script: |
        XCRESULT="$(Agent.BuildDirectory)/s/test_output/report.xcresult"
        if [ -d "$XCRESULT" ]; then
          xcrun xcresulttool get test-results tests \
            --path "$XCRESULT" \
            --format junit \
            > "$(Agent.BuildDirectory)/s/test_output/report.junit" 2>/dev/null \
          || echo "##[warning]Failed to convert xcresult to JUnit"
        fi
  - task: PublishTestResults@2
    condition: succeededOrFailed()
    displayName: 'Publish test results to ADO'
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(Agent.BuildDirectory)/s/test_output/report.junit'
      testRunTitle: '${{ parameters.schema }}'
      failTaskOnFailedTests: false

  # Ensure the diagnostic-reports folder always exists so the publish step
  # below doesn't fail when the test exited non-zero without producing a
  # crash report (xctest timeout / assertion failure / xcodebuild error).
  - task: Bash@3
    condition: failed()
    displayName: "Ensure crash report folder exists"
    inputs:
      targetType: 'inline'
      script: |
        CRASH_DIR="$HOME/Library/Logs/DiagnosticReports"
        mkdir -p "$CRASH_DIR"
        echo "##vso[task.setvariable variable=crashReportFolder]$CRASH_DIR"

  - task: PublishPipelineArtifact@1
    condition: failed()
    displayName: "Publish crash report if any"
    inputs:
      targetPath: "$(crashReportFolder)"
      artifactName: "crash folder"
      publishLocation: "pipeline"
  
