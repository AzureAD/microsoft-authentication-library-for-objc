steps:
  - checkout: self
    clean: true
    submodules: true
    fetchDepth: 1
    persistCredentials: true
    path: s
    
  - task: Bash@3
    displayName: 'Select Xcode version'
    inputs:
      targetType: 'inline'
      script: |
        sudo xcode-select -s /Applications/Xcode_26.3.app
        sudo ln -sfn /Applications/Xcode_26.3.app /Applications/Xcode.app
  
  - task: Bash@3
    displayName: 'Detect iOS simulator'
    inputs:
      targetType: 'inline'
      script: |
        DEFAULT_DEVICE="iPhone 17 Pro Max"
        
        # Use simctl JSON output to find the UDID of the latest runtime for the preferred device.
        # This avoids ambiguity when multiple runtimes have the same device name.
        UDID=$(xcrun simctl list devices available -j \
          | python3 -c "
        import json, sys, re
        data = json.load(sys.stdin)
        best = None
        for runtime, devices in data.get('devices', {}).items():
            m = re.search(r'iOS[.-](\d+)[.-](\d+)', runtime)
            if not m:
                continue
            ver = (int(m.group(1)), int(m.group(2)))
            for d in devices:
                if d.get('name') == '${DEFAULT_DEVICE}' and d.get('isAvailable'):
                    if best is None or ver > best[0]:
                        best = (ver, d['udid'], d['name'])
        if best:
            print(best[1])
        ")
        
        if [ -n "$UDID" ]; then
          DEST="platform=iOS Simulator,id=$UDID"
          echo "Selected: ${DEFAULT_DEVICE} (UDID: $UDID)"
        else
          echo "Warning: ${DEFAULT_DEVICE} not found, falling back to name-based destination"
          # Fallback: find any Pro Max by name
          FALLBACK=$(xcrun simctl list devices available | grep "Pro Max" | grep -v "unavailable" \
            | sed 's/ ([A-F0-9-]*) *//g' | sed 's/ *(Shutdown)//;s/ *(Booted)//' \
            | sed 's/^[[:space:]]*//' | sort -u | tail -1)
          [ -z "$FALLBACK" ] && FALLBACK="$DEFAULT_DEVICE"
          DEST="platform=iOS Simulator,name=$FALLBACK"
          echo "Fallback destination: $DEST"
        fi
        
        echo "##vso[task.setvariable variable=SIM_DESTINATION]$DEST"
  
  - task: Bash@3
    displayName: Go to project folder
    inputs:
      targetType: 'inline'
      script: |        
        cd $(Agent.BuildDirectory)/s
  
  - script: 'gem uninstall xcpretty -I --version 0.4.0'
    displayName: 'Uninstall xcpretty v0.4.0'
  
  - script: 'gem install xcpretty -v 0.3.0'
    displayName: 'Install xcpretty v0.3.0'

  - task: AzureCLI@2
    displayName: 'Read configuration from KeyVault'
    inputs:
      azureSubscription: 'AuthSdkResourceManager'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: 'python get_automation_conf_file.py'
      workingDirectory: azure_pipelines/scripts/
  - task: Bash@3
    displayName: Build for testing
    inputs:
      targetType: 'inline'
      script: |
        mv azure_pipelines/scripts/conf.json MSAL/test/automation/conf.json
        ruby TestRubyFile.rb
        xcodebuild build-for-testing \
          -workspace MSAL.xcworkspace \
          -scheme '${{ parameters.schema }}' \
          -sdk ${{ parameters.sdk }} \
          -destination '${{ parameters.destination }}' \
          -derivedDataPath 'build' \
          2>&1 | tee xcodebuild.log | xcpretty -c
        BUILD_EXIT=${PIPESTATUS[0]}
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "##[error]xcodebuild build-for-testing failed with exit code $BUILD_EXIT"
          echo "##[group]Raw xcodebuild log (last 200 lines)"
          tail -200 xcodebuild.log
          echo "##[endgroup]"
          exit $BUILD_EXIT
        fi

  - ${{ if eq(parameters.retry_tests, 'true') }}:    
    - task: Bash@3
      displayName: Run automations
      inputs:
        targetType: 'inline'
        script: |
          xcodebuild test-without-building \
              -workspace MSAL.xcworkspace \
              -scheme '${{ parameters.schema }}' \
              -sdk ${{ parameters.sdk }} \
              -destination '${{ parameters.destination }}' \
              -derivedDataPath 'build' \
              -retry-tests-on-failure \
              -test-iterations 3 \
              -parallel-testing-enabled NO \
              -quiet \
              -resultBundlePath '$(Agent.BuildDirectory)/s/test_output/report.xcresult'
  - ${{ if eq(parameters.retry_tests, 'false') }}:    
    - task: Bash@3
      displayName: Run automations
      inputs:
        targetType: 'inline'
        script: |
          xcodebuild test-without-building \
              -workspace MSAL.xcworkspace \
              -scheme '${{ parameters.schema }}' \
              -sdk ${{ parameters.sdk }} \
              -destination '${{ parameters.destination }}' \
              -derivedDataPath 'build' \
              -parallel-testing-enabled NO \
              -resultBundlePath '$(Agent.BuildDirectory)/s/test_output/report.xcresult'

  # https://learn.microsoft.com/en-us/azure/devops/pipelines/artifacts/pipeline-artifacts?view=azure-devops&tabs=yaml#q-can-i-delete-pipeline-artifacts-when-re-running-failed-jobs
  - task: PublishPipelineArtifact@1
    condition: succeededOrFailed()
    inputs:
      targetPath: '$(Agent.BuildDirectory)/s/test_output/'
      artifactName: 'TestOutputs Attempt - $(System.StageAttempt) - ${{ parameters.schema }}'
      publishLocation: 'pipeline'
  - task: PublishPipelineArtifact@1
    condition: failed()
    displayName: "Publish crash report if any"
    inputs:
      targetPath: "/Users/runner/Library/Logs/DiagnosticReports"
      artifactName: "crash folder"
      publishLocation: "pipeline"
  
